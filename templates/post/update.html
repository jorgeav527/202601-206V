{% extends "base.html" %}
{% block title %}Update{% endblock %}
{% block content %}
    <h1>Update Post</h1>
    <form method="post">
        <label>Title</label><br>
        <input type="text" name="title" value="{{ post['title'] }}"><br>
        <label>Content</label><br>
        <textarea name="content">{{ post['content'] }}</textarea><br>
        <button type="submit">Update</button>
    </form>
{% endblock %}
