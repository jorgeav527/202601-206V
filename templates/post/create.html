{% extends "base.html" %}
{% block title %}Create{% endblock %}
{% block content %}
    <h1>Create Post</h1>
    <form method="post" x-data="{ content: '' }">
        <label>Title</label><br>
        <input type="text" name="title"><br>
        <label>Content</label><br>
        <textarea name="content" x-model="content"></textarea><br>
        <small x-text="content.length + ' characters'"></small><br><br>
        <button type="submit">Save</button>
    </form>
{% endblock %}
