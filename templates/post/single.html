{% extends "base.html" %}
{% block title %}{{ post['title'] }}{% endblock %}
{% block content %}
    <h1>{{ post['title'] }}</h1>
    <p>Created at: {{ post['created_at'] }}</p>
    <div>{{ post['content'] }}</div>
    <hr>
    <form action="{{ url_for('delete', id=post['id']) }}" method="POST">
        <input type="submit" value="Delete" onclick="return confirm('Delete?')">
    </form>
{% endblock %}
