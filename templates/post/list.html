{% extends "base.html" %}

{% block content %}
<table class="">
  <thead>
    <tr>
      <th>ID</th>
      <th>Título</th>
      <th>Contenido</th>
      <th>Fecha de Creación</th>
    </tr>
  </thead>
  <tbody>
    {% for post in posts %}
    <tr>
      <td>{{ post['id'] }}</td>
      <td>{{ post['title'] }}</td>
      <td>{{ post['content'] }}</td>
      <td>{{ post['created'] }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<a href="{{ url_for('home') }}" class="btn btn-primary">
    Volver al blog
</a>
{% endblock content %}
