{% extends "base.html" %}

{% block title %}Posts{% endblock %}

{% block content %}
    <h1>Posts</h1>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Content</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for post in posts %}
            <tr>
                <td>
                    <a href="{{ url_for('get_post_detail', id=post['id']) }}">{{ post['id'] }}</a>
                </td>
                <td>{{ post['title'] }}</td>
                <td>{{ post['content'] }}</td>
                <td>
                    <a href="{{ url_for('edit', id=post['id']) }}"><button>Update</button></a>
                    <form action="{{ url_for('delete', id=post['id']) }}" method="POST" style="display:inline;">
                        <button type="submit" onclick="return confirm('Delete?')">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
