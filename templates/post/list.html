{% extends "base.html" %}

{% block title %}Posts{% endblock %}

{% block content %}
    <h1>Posts</h1>

    <div x-data="{ search: '' }">
        <input type="text" x-model="search" placeholder="Search...">
        <br><br>

        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Content</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody hx-confirm="Are you sure?" hx-target="closest tr" hx-swap="outerHTML swap:1s">
                {% for post in posts %}
                <tr x-show="search === '' || $el.textContent.toLowerCase().includes(search.toLowerCase())">
                    <td>
                        <a href="{{ url_for('get_post_detail', id=post['id']) }}">{{ post['id'] }}</a>
                    </td>
                    <td>{{ post['title'] }}</td>
                    <td>{{ post['content'] }}</td>
                    <td>{{ post['created_at'] }}</td>
                    <td>
                        <a href="{{ url_for('edit', id=post['id']) }}"><button>Update</button></a>
                        <button hx-delete="{{ url_for('delete', id=post['id']) }}">Delete</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
